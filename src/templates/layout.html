<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AstraNotes{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="brand" href="{{ url_for('index') }}">AstraNotes</a>
        <div class="nav-links">
          <a href="{{ url_for('notes.list_notes') }}">Notes</a>
          <a href="{{ url_for('notes.new_note') }}">New Note</a>
          <a href="{{ url_for('auth.login') }}">Login</a>
          <a href="{{ url_for('auth.register') }}">Register</a>
        </div>
      </nav>
    </header>

    <main class="page">
      {% if message %}
        <section class="notice">{{ message }}</section>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
